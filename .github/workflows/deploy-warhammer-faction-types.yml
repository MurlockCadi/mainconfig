name: Deploy Warhammer faction types

on:
  push:
    branches:
      - main
    paths:
      - "warhammer_faction_types/**/*.lua"
      - ".github/workflows/deploy-warhammer-faction-types.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-warhammer-faction-types
  cancel-in-progress: false

env:
  FTP_SERVER: "sftp://chi-s-game-2.physgun.com:2022"
  FTP_USER: "matty.cooke@hotmail.com.fcd13098"

  SOURCE_DIR: "warhammer_faction_types"

  REMOTE_PATH: "/garrysmod/addons/murlock_bot_types/lua/autorun/server/"
  OUTPUT_FILE: "murlock_bot_types.lua"

  GENERATED_FILE: "generated_warhammer_faction_types.lua"
  TEMP_FILE: "temp_warhammer_faction_types.lua"

jobs:
  generate-and-deploy:
    name: Generate and deploy faction types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check source directory
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "Directory $SOURCE_DIR was not found."
            exit 1
          fi

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Generate combined Lua file
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t lua_files < <(
            find "$SOURCE_DIR" \
              -maxdepth 1 \
              -type f \
              -name '*.lua' \
              -print |
            sort
          )

          if [ "${#lua_files[@]}" -eq 0 ]; then
            echo "No Lua files were found in $SOURCE_DIR."
            exit 1
          fi

          {
            printf '%s\n' '--------------------------------------------------'
            printf '%s\n' '--THIS FILE IS SOURCE-CONTROLLED.'
            printf '%s\n' '--Do NOT edit this file directly.'
            printf '%s\n'
            printf '%s\n' '--Instead, make changes here:'
            printf '%s\n' '--https://github.com/MurlockCadi/mainconfig/tree/main/warhammer_faction_types'
            printf '%s\n\n' '--------------------------------------------------'

            printf '%s\n\n' 'FACTION_TYPES = FACTION_TYPES or {}'

            for file in "${lua_files[@]}"; do
              echo "Adding $file"
              cat "$file"
              printf '\n\n'
            done
          } > "$GENERATED_FILE"

          if [ ! -s "$GENERATED_FILE" ]; then
            echo "Generated file is empty."
            exit 1
          fi

          echo "Generated $GENERATED_FILE from ${#lua_files[@]} Lua files."

      - name: Run Lua syntax check
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking Lua syntax for $GENERATED_FILE..."
          luac5.1 -p "$GENERATED_FILE"

      - name: Compare with server file
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          should_upload=true

          if curl \
            --silent \
            --show-error \
            --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --output "$TEMP_FILE" \
            "$FTP_SERVER$REMOTE_PATH$OUTPUT_FILE"
          then
            if cmp -s "$GENERATED_FILE" "$TEMP_FILE"; then
              echo "The server file is already up to date."
              should_upload=false
            else
              echo "The generated file differs from the server file."
            fi
          else
            echo "The existing server file could not be downloaded."
            echo "The generated file will be uploaded."
            rm -f "$TEMP_FILE"
          fi

          echo "should_upload=$should_upload" >> "$GITHUB_OUTPUT"

      - name: Upload generated file
        if: steps.compare.outputs.should_upload == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Uploading $GENERATED_FILE as $OUTPUT_FILE..."

          curl \
            --silent \
            --show-error \
            --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --upload-file "$GENERATED_FILE" \
            "$FTP_SERVER$REMOTE_PATH$OUTPUT_FILE"

          echo "Upload complete."

      - name: Deployment summary
        shell: bash
        run: |
          if [ "${{ steps.compare.outputs.should_upload }}" = "true" ]; then
            echo "### Warhammer faction types uploaded" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No upload required" >> "$GITHUB_STEP_SUMMARY"
            echo "The generated file was identical to the server file." >> "$GITHUB_STEP_SUMMARY"
          fi

name: Deploy main_config_sh.lua to Warhammer

on:
  push:
    branches:
      - main
    paths:
      - "main_config_sh.lua"

permissions:
  contents: read

env:
  FTP_SERVER: "sftp://chi-s-game-2.physgun.com:2022"
  FTP_USER: "987crazymuffin@gmail.com.fcd13098"
  REMOTE_PATH: "/garrysmod/gamemodes/warhammer40k/gamemode/"
  FILE_TO_UPLOAD: "main_config_sh.lua"
  TEMP_FILE: "temp_main_config_sh.lua"

jobs:
  lua-check:
    name: Lua syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check file exists
        run: |
          if [ ! -f "$FILE_TO_UPLOAD" ]; then
            echo "File $FILE_TO_UPLOAD not found."
            exit 1
          fi

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run Lua syntax check
        run: |
          echo "Checking Lua syntax for $FILE_TO_UPLOAD..."
          luac5.1 -p "$FILE_TO_UPLOAD"

  compare-server-file:
    name: Compare with server file
    runs-on: ubuntu-latest
    needs: lua-check

    outputs:
      should_upload: ${{ steps.compare.outputs.should_upload }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download existing server file
        run: |
          curl --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --output "$TEMP_FILE" \
            "$FTP_SERVER$REMOTE_PATH$FILE_TO_UPLOAD"

      - name: Compare files
        id: compare
        run: |
          if cmp -s "$FILE_TO_UPLOAD" "$TEMP_FILE"; then
            echo "The file on the server is already the same. Upload not needed."
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          else
            echo "File differs. Upload needed."
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          fi

  upload-to-server:
    name: Upload to Warhammer server
    runs-on: ubuntu-latest
    needs: compare-server-file

    if: needs.compare-server-file.outputs.should_upload == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload file
        run: |
          echo "Uploading $FILE_TO_UPLOAD to Warhammer server..."

          curl --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --upload-file "$FILE_TO_UPLOAD" \
            "$FTP_SERVER$REMOTE_PATH$FILE_TO_UPLOAD"

          echo "Upload complete."

name: Deploy Warhammer misc configs

on:
  push:
    branches:
      - main
    paths:
      - "warhammer_misc_configs/**/*.lua"
      - ".github/workflows/deploy-warhammer-misc-configs.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-warhammer-misc-configs
  cancel-in-progress: false

env:
  FTP_SERVER: "sftp://chi-s-game-3.physgun.com:2022"
  FTP_USER: "987crazymuffin@gmail.com.fcd13098"
  SOURCE_DIR: "warhammer_misc_configs"
  REMOTE_PATH: "/garrysmod/addons/murlock_git_sync/lua/autorun/"
  OUTPUT_FILE: "murlock_git_sync.lua"
  GENERATED_FILE: "generated_murlock_git_sync.lua"
  TEMP_FILE: "remote_murlock_git_sync.lua"

jobs:
  generate-and-deploy:
    name: Generate and deploy misc configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check source directory
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "Directory $SOURCE_DIR was not found."
            exit 1
          fi

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Generate combined Lua file
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t lua_files < <(
            find "$SOURCE_DIR" \
              -maxdepth 1 \
              -type f \
              -name '*.lua' \
              -print |
            sort
          )

          if [ "${#lua_files[@]}" -eq 0 ]; then
            echo "No Lua files were found in $SOURCE_DIR."
            exit 1
          fi

          {
            printf '%s\n' '-- --------------------------------------------------'
            printf '%s\n' '-- THIS FILE IS SOURCE-CONTROLLED.'
            printf '%s\n' '-- Do NOT edit this file directly.'
            printf '%s\n' '--'
            printf '%s\n' '-- Instead, make changes here:'
            printf '%s\n' '-- https://github.com/MurlockCadi/mainconfig/tree/main/warhammer_misc_configs'
            printf '%s\n\n' '-- --------------------------------------------------'

            for file in "${lua_files[@]}"; do
              printf '%s\n' "-- BEGIN SOURCE FILE: $file"
              cat "$file"
              printf '\n%s\n\n' "-- END SOURCE FILE: $file"
            done
          } > "$GENERATED_FILE"

          if [ ! -s "$GENERATED_FILE" ]; then
            echo "Generated file is empty."
            exit 1
          fi

          echo "Generated $GENERATED_FILE from ${#lua_files[@]} Lua files."

      - name: Run Lua syntax check
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking Lua syntax for $GENERATED_FILE..."

          syntax_error_file="$(mktemp)"

          if ! luac5.1 -p "$GENERATED_FILE" 2>"$syntax_error_file"; then
            syntax_error="$(cat "$syntax_error_file")"

            echo
            echo "::error title=Lua syntax error::$syntax_error"
            echo "$syntax_error"
            echo

            error_line="$(
              sed -nE 's/.*:([0-9]+):.*/\1/p' "$syntax_error_file" |
              head -n 1
            )"

            if [[ "$error_line" =~ ^[0-9]+$ ]]; then
              context_before=8
              context_after=8

              start_line=$((error_line - context_before))
              end_line=$((error_line + context_after))

              if [ "$start_line" -lt 1 ]; then
                start_line=1
              fi

              echo "Showing generated file lines $start_line to $end_line:"
              echo "--------------------------------------------------"

              nl -ba "$GENERATED_FILE" |
                sed -n "${start_line},${end_line}p"

              echo "--------------------------------------------------"
              echo "The syntax error was reported on generated line $error_line."
              echo "Check the nearest BEGIN SOURCE FILE comment above it."
            else
              echo "Could not determine the syntax error line number."
              echo
              echo "Complete generated file:"
              nl -ba "$GENERATED_FILE"
            fi

            rm -f "$syntax_error_file"
            exit 1
          fi

          rm -f "$syntax_error_file"

          echo "Lua syntax check passed."

      - name: Compare with server file
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          should_upload=true

          if curl \
            --silent \
            --show-error \
            --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --output "$TEMP_FILE" \
            "$FTP_SERVER$REMOTE_PATH$OUTPUT_FILE"
          then
            if cmp -s "$GENERATED_FILE" "$TEMP_FILE"; then
              echo "The server file is already up to date."
              should_upload=false
            else
              echo "The generated file differs from the server file."
            fi
          else
            echo "The existing server file could not be downloaded."
            echo "The generated file will be uploaded."
            rm -f "$TEMP_FILE"
          fi

          echo "should_upload=$should_upload" >> "$GITHUB_OUTPUT"

      - name: Upload generated file
        if: steps.compare.outputs.should_upload == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Uploading $GENERATED_FILE as $OUTPUT_FILE..."

          curl \
            --silent \
            --show-error \
            --insecure \
            --fail \
            --user "$FTP_USER:${{ secrets.IMPERIUMRP_PASSWORD }}" \
            --upload-file "$GENERATED_FILE" \
            "$FTP_SERVER$REMOTE_PATH$OUTPUT_FILE"

          echo "Upload complete."

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.compare.outputs.should_upload }}" = "true" ]; then
            echo "### Warhammer misc configs uploaded" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.compare.outputs.should_upload }}" = "false" ]; then
            echo "### No upload required" >> "$GITHUB_STEP_SUMMARY"
            echo "The generated file was identical to the server file." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Deployment did not complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the failed workflow step for details." >> "$GITHUB_STEP_SUMMARY"
          fi
